<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#3F51B5">
    <meta name="robots" content="noindex,nofollow">
    <title>Admin Login | FurniRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Merriweather:wght@700;800&display=swap"
        rel="stylesheet">

    <script>
        (() => {
            const theme = localStorage.getItem("theme");
            if (theme === "dark") {
                document.documentElement.classList.add("dark-mode");
                document.body?.classList.add("dark-mode");
            }
        })();
    </script>
    <script>
        (() => {
            const dir = localStorage.getItem("dir");
            if (dir === "rtl") {
                document.documentElement.setAttribute("dir", "rtl");
            }
        })();
    </script>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>

<body class="">

    <!-- ==========================================
    ADMIN LOGIN SECTION
    ========================================== -->

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="login-card">
                        <div class="text-center mb-4">
                            <div class="hero-feature-icon mx-auto mb-3">
                                <i class="fa-solid fa-user-shield"></i>
                            </div>
                            <h2 class="mb-1">Admin Login</h2>
                            <p class="text-muted">Sign in to manage FurniRent</p>
                        </div>


                        <div id="adminLoginAlert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="adminLoginForm">

                            <div class="mb-4">
                                <label class="form-label">Admin Email</label>
                                <input type="email" id="adminLoginEmail" class="form-control form-control-lg"
                                    placeholder="Enter admin email" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="password-box">
                                    <input type="password" id="adminLoginPassword" class="form-control form-control-lg"
                                        placeholder="Enter password" required minlength="6">
                                    <button type="button" class="password-toggle" onclick="toggleAdminLoginPassword()">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <button class="btn btn-primary btn-lg w-100 mt-3" type="submit">
                                Login to Admin Panel
                            </button>

                            <div class="security-badges mt-4">
                                <div>
                                    <i class="fa-solid fa-lock"></i>
                                    SSL Secured
                                </div>
                                <div>
                                    <i class="fa-solid fa-shield-halved"></i>
                                    Restricted Access
                                </div>
                            </div>

                            <p class="text-center mt-4">
                                Need an admin account?
                                <a href="admin-signup.html">Sign Up</a>
                            </p>

                            <p class="text-center mt-2">
                                <a href="login.html" class="text-decoration-none fw-semibold">
                                    <i class="fa-solid fa-arrow-left me-1"></i>
                                    Back to Customer Login
                                </a>
                            </p>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    

    <button class="back-to-top btn btn-primary rounded-circle position-fixed bottom-0 end-0 m-4 shadow d-none"
        aria-label="Back to Top" style="width: 50px; height: 50px; z-index: 999;">
        <i class="fa-solid fa-arrow-up text-white"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        function toggleAdminLoginPassword() {
            const input = document.getElementById("adminLoginPassword");
            const icon = document.querySelector("#adminLoginForm .password-toggle i");
            if (!input || !icon) return;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        (() => {
            const form = document.getElementById("adminLoginForm");
            const alertBox = document.getElementById("adminLoginAlert");

            if (!form) return;

            form.addEventListener("submit", (e) => {
                e.preventDefault();

                const email = document.getElementById("adminLoginEmail").value;
                const password = document.getElementById("adminLoginPassword").value;

                const result = FurniAuth.login(email, password, "admin");

                if (result.success) {
                    window.location.href = "admin-dashboard.html";
                } else {
                    alertBox.textContent = result.message;
                    alertBox.classList.remove("d-none");
                }
            });
        })();
    </script>



</body>

</html>
