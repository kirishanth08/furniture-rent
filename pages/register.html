<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png">
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="apple-touch-icon" href="../assets/images/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#3F51B5">
    <title>Register | FurniRent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Merriweather:wght@700;800&display=swap"
        rel="stylesheet">
    <script>
        (() => {
            const theme = localStorage.getItem("theme");
            if (theme === "dark") {
                document.documentElement.classList.add("dark-mode");
                document.body?.classList.add("dark-mode");
            }
        })();
    </script>
    <script>
        (() => {
            const dir = localStorage.getItem("dir");
            if (dir === "rtl") {
                document.documentElement.setAttribute("dir", "rtl");
            }
        })();
    </script>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/rtl.css">
</head>

<body class="">


    <!--=========================================
REGISTER SECTION
==========================================-->

    <section class="section-padding">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-5">

                    <div class="login-card">

                        <a href="index.html" class="d-flex align-items-center justify-content-center gap-2 text-decoration-none mb-4">
                            <svg width="40" height="40" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FurniRent logo">
                                <rect x="0" y="0" width="42" height="42" rx="12" fill="#3F51B5"/>
                                <rect x="7" y="17" width="5" height="11" rx="2" fill="#ffffff"/>
                                <rect x="30" y="17" width="5" height="11" rx="2" fill="#ffffff"/>
                                <rect x="9" y="8" width="24" height="11" rx="4" fill="#ffffff"/>
                                <rect x="8" y="19" width="26" height="8" rx="3" fill="#ffffff"/>
                                <circle cx="31.5" cy="10.5" r="2.6" fill="#FFC107"/>
                            </svg>
                            <span class="fw-bold fs-3 text-primary" style="font-family: 'Merriweather', serif;">
                                Furni<span class="text-warning">Rent</span>
                            </span>
                        </a>

                        <p class="text-center text-muted mb-4">
                            Welcome! Create your account to get started.
                        </p>

                        <h2 class="mb-4 text-center">

                            Create Account

                        </h2>

                        <div id="registerAlert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="registerForm">

                            <div class="mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input type="text" id="registerName" class="form-control form-control-lg"
                                    placeholder="Enter your full name" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Email Address

                                </label>

                                <input type="email" id="registerEmail" class="form-control form-control-lg"
                                    placeholder="Enter your email" required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input type="tel" class="form-control form-control-lg"
                                    placeholder="Enter mobile number">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Password

                                </label>

                                <div class="password-box">

                                    <input type="password" id="registerPassword" class="form-control form-control-lg"
                                        placeholder="Create password" required minlength="6">

                                    <button type="button" class="password-toggle" onclick="toggleRegisterPassword()">

                                        <i class="fa-solid fa-eye"></i>

                                    </button>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">

                                    Confirm Password

                                </label>

                                <input type="password" id="registerConfirmPassword" class="form-control form-control-lg"
                                    placeholder="Confirm password" required minlength="6">

                            </div>

                            <!-- Terms -->

                            <div class="form-check mb-4">

                                <input class="form-check-input" type="checkbox" id="terms" required>

                                <label class="form-check-label" for="terms">

                                    I agree to the

                                    <a href="#">

                                        Terms & Conditions

                                    </a>

                                </label>

                            </div>

                            <!-- Register Button -->

                            <button type="submit" class="btn btn-warning btn-lg w-100 fw-semibold">

                                Create Account

                            </button>

                            <div class="divider-text">
                                <span>Or sign up with</span>
                            </div>

                            <div class="social-login-buttons">

                                <button type="button" id="googleSignupBtn" class="btn-social btn-google">
                                    <i class="fa-brands fa-google"></i>
                                    Continue with Google
                                </button>

                                <button type="button" id="appleSignupBtn" class="btn-social btn-apple">
                                    <i class="fa-brands fa-apple"></i>
                                    Continue with Apple
                                </button>

                            </div>

                            <hr class="my-4">


                            <!-- Security -->

                            <div class="security-badges mt-4">

                                <div>

                                    <i class="fa-solid fa-lock"></i>

                                    SSL Secured

                                </div>

                                <div>

                                    <i class="fa-solid fa-user-check"></i>

                                    Verified

                                </div>

                                <div>

                                    <i class="fa-solid fa-shield-halved"></i>

                                    Safe Signup

                                </div>

                            </div>

                            <p class="text-center mt-4 mb-0">

                                Already have an account?

                                <a href="login.html" id="registerToLoginLink">

                                    Login

                                </a>

                            </p>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <button class="back-to-top btn btn-primary rounded-circle position-fixed bottom-0 end-0 m-4 shadow d-none"
        aria-label="Back to Top" style="width: 50px; height: 50px; z-index: 999;">
        <i class="fa-solid fa-arrow-up text-white"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/main.js"></script>

    <script>
        (() => {
            const form = document.getElementById("registerForm");
            const alertBox = document.getElementById("registerAlert");
            const redirectTo = new URLSearchParams(window.location.search).get("redirect");

            const loginLink = document.getElementById("registerToLoginLink");
            if (loginLink && redirectTo) {
                loginLink.href = "login.html?redirect=" + encodeURIComponent(redirectTo);
            }

            if (!form) return;

            form.addEventListener("submit", (e) => {
                e.preventDefault();

                const name = document.getElementById("registerName").value;
                const email = document.getElementById("registerEmail").value;
                const password = document.getElementById("registerPassword").value;
                const confirmPassword = document.getElementById("registerConfirmPassword").value;

                if (password !== confirmPassword) {
                    alertBox.textContent = "Passwords do not match.";
                    alertBox.classList.remove("d-none");
                    return;
                }

                const result = FurniAuth.signup(name, email, password, "customer");

                if (result.success) {
                    window.location.href = redirectTo ? redirectTo : "dashboard-home.html";
                } else {
                    alertBox.textContent = result.message;
                    alertBox.classList.remove("d-none");
                }
            });

            const redirectAfterSocial = () => {
                window.location.href = redirectTo ? redirectTo : "dashboard-home.html";
            };

            const googleBtn = document.getElementById("googleSignupBtn");
            const appleBtn = document.getElementById("appleSignupBtn");

            if (googleBtn) {
                googleBtn.addEventListener("click", () => {
                    const result = FurniAuth.socialLogin("google", "customer");
                    if (result.success) redirectAfterSocial();
                });
            }

            if (appleBtn) {
                appleBtn.addEventListener("click", () => {
                    const result = FurniAuth.socialLogin("apple", "customer");
                    if (result.success) redirectAfterSocial();
                });
            }
        })();
    </script>

    

</body>

</html>
